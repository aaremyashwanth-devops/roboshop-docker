services:
  mongodb:
    build: ./mongodb
    image: mongodb:1.0.0
    container_name: mongodb  
  catalogue:
    build: ./catalogue
    image: catalogue:1.0.0
    container_name: catalogue
    depends_on:
      - mongodb
  frontend: 
    build: ./frontend
    image: frontend:1.0.0
    container_name: frontend
    ports: 
      - "80:80"
networks:
  default:
    driver: bridge
    name: roboshop
    external: false

    